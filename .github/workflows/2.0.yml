<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --yt-red: #FF0000;
            --bg-black: #000000;
        }
        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        /* The glow effect behind the numbers */
        .container {
            position: relative;
            z-index: 1;
        }
        #count {
            font-size: 58px;
            font-weight: 800;
            line-height: 1;
            margin: 5px 0;
            color: white;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            animation: pulse 2s infinite ease-in-out;
        }
        #label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        /* YouTube Icon styling */
        .yt-logo {
            width: 40px;
            fill: var(--yt-red);
            margin-bottom: 5px;
        }
        /* Subtle pulse animation */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="yt-logo" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        
        <div id="label">Subscribers</div>
        <div id="count">---</div>
    </div>

    <script>
        const API_KEY = 'AIzaSyCzk6dE5s1VQTluDdq-Xfhl3_Quep0I0zc';
        const CHANNEL_ID = 'UCvshvKXpJTE07A10eNyFQ1w';

        async function updateSubs() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
                const data = await response.json();
                const subCount = data.items[0].statistics.subscriberCount;
                
                // Animating the number change slightly
                document.getElementById('count').innerText = Number(subCount).toLocaleString();
            } catch (error) {
                console.error("Error fetching data", error);
                document.getElementById('count').innerText = "OFFLINE";
            }
        }

        updateSubs();
        setInterval(updateSubs, 300000); // 5 minute refresh
    </script>
</body>
</html>
