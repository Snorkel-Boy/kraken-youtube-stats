<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #count {
            font-size: 48px; /* Big for the small screen */
            font-weight: bold;
            color: #FF0000; /* YouTube Red */
        }
        #label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="count">---</div>
    <div id="label">Subscribers</div>

    <script>
        const API_KEY = 'AIzaSyCzk6dE5s1VQTluDdq-Xfhl3_Quep0I0zc';
        const CHANNEL_ID = 'UCvshvKXpJTE07A10eNyFQ1w';

        async function updateSubs() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
                const data = await response.json();
                const subCount = data.items[0].statistics.subscriberCount;
                
                // Format numbers (e.g., 1000 -> 1,000)
                document.getElementById('count').innerText = Number(subCount).toLocaleString();
            } catch (error) {
                document.getElementById('count').innerText = "Err";
            }
        }

        // Update every 5 minutes (to avoid hitting API limits)
        updateSubs();
        setInterval(updateSubs, 300000); 
    </script>
</body>
</html>
